<div class="auth-container">

  <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" class="auth-card">

    <h2>Login</h2>

    <div class="form-group">
      <input type="text"
             name="username"
             [(ngModel)]="username"
             required
             minlength="3"
             placeholder="Username or Email"
             #usernameRef="ngModel">

      <small *ngIf="usernameRef.invalid && usernameRef.touched">
        Username must be at least 3 characters.
      </small>
    </div>

    <div class="form-group">
      <input type="password"
             name="password"
             [(ngModel)]="password"
             required
             minlength="6"
             placeholder="Password"
             #passwordRef="ngModel">

      <small *ngIf="passwordRef.invalid && passwordRef.touched">
        Password must be at least 6 characters.
      </small>
    </div>

    <button type="submit" [disabled]="loginForm.invalid || isLoading">
      {{ isLoading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="error" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

  </form>

</div>
