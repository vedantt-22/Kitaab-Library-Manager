<div class="admin-container">

  <div class="header">
    <h2>Manage Books</h2>
    <button (click)="createBook()" class="primary-btn">
      + Add Book
    </button>
  </div>

  <ng-container *ngIf="vm$ | async as vm">

    <app-loading-spinner *ngIf="vm.isLoading"></app-loading-spinner>

    <p class="error" *ngIf="vm.errorMessage">
      {{ vm.errorMessage }}
    </p>

    <table *ngIf="!vm.isLoading" class="admin-table">

      <thead>
        <tr>
          <th>Title</th>
          <th>Category</th>
          <th>Copies</th>
          <th>Available</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let book of vm.books; trackBy: trackById"
            appHighlight="rgba(0, 245, 255, 0.06)">

          <td>{{ book.title }}</td>
          <td>{{ book.category }}</td>
          <td>{{ book.totalCopies }}</td>
          <td>{{ book.availableCopies }}</td>

          <td>
            <button (click)="editBook(book.id)" class="edit-btn">
              Edit
            </button>

            <button (click)="confirmDelete(book.id)" class="delete-btn">
              Delete
            </button>
          </td>

        </tr>
      </tbody>

    </table>

  </ng-container>

  <app-confirm-dialog
    [isOpen]="showDialog"
    (confirmed)="deleteBook()"
    (cancelled)="cancelDelete()">

    <p>Are you sure you want to delete this book?</p>

  </app-confirm-dialog>

</div>
